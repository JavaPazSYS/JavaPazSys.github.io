<div class="landing-page-wrapper">
    <!-- Hero Section -->
    <header class="hero-section">
        <div class="hero-content">
            <h1>Crea Interfaces Sorprendentes</h1>
            <p>Biblioteca de componentes UI diseñada con proporciones perfectas y estilos modernos usando Glassmorphism.
            </p>
            <div class="hero-actions">
                <button class="btn-primary">Empezar Ahora</button>
                <button class="btn-secondary">Ver Documentación</button>
            </div>
        </div>
    </header>

    <!-- Features Section con Carousel -->
    <section class="features-section">
        <app-carousel [slots]="features"></app-carousel>
    </section>

    <!-- CTA Section -->
    <section class="cta-section">
        <h2>¿Listo para elevar tu proyecto?</h2>
        <button class="btn-primary large">Descargar Plantilla</button>
    </section>
</div>
